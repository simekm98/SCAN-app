name: WG26Scan
options:
  bundleIdPrefix: com.simekm98
  deploymentTarget:
    iOS: "16.0"
targets:
  WG26Scan:
    type: application
    platform: iOS
    sources:
      - path: Sources
    info:
      path: Info.plist
      properties:
        NSCameraUsageDescription: "Aplikace potřebuje přístup k fotoaparátu pro skenování řeziva."
        NSMotionUsageDescription: "Aplikace využívá pohybové senzory pro odometrii při skenu."
        NSMicrophoneUsageDescription: "Aplikace využívá mikrofon pro hlasové povely (start, stop, zamknout)."
        NSSpeechRecognitionUsageDescription: "Aplikace rozpoznává hlasové povely pro ovládání skenování."
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    dependencies:
      - framework: ARKit.framework
        embed: false
      - framework: RealityKit.framework
        embed: false
      - framework: Speech.framework
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.simekm98.wg26scan
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGNING_ALLOWED: "NO"
        CODE_SIGNING_REQUIRED: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
